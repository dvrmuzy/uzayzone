<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEONBALL — Brick Breaker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #04060f;
    --panel: #080d1e;
    --neon-cyan: #00ffe7;
    --neon-pink: #ff2d78;
    --neon-yellow: #ffe600;
    --neon-purple: #b44eff;
    --neon-orange: #ff6b1a;
    --grid: rgba(0,255,231,0.04);
    --glow-cyan: 0 0 8px #00ffe7, 0 0 24px rgba(0,255,231,0.4);
    --glow-pink: 0 0 8px #ff2d78, 0 0 24px rgba(255,45,120,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,255,231,0.07) 0%, transparent 70%),
                radial-gradient(ellipse 60% 40% at 50% 100%, rgba(255,45,120,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  #wrapper {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 28px;
    align-items: flex-start;
  }

  #sidebar {
    display: flex;
    flex-direction: column;
    gap: 18px;
    width: 150px;
  }

  .stat-box {
    background: var(--panel);
    border: 1px solid rgba(0,255,231,0.18);
    border-radius: 4px;
    padding: 14px 16px;
    position: relative;
    overflow: hidden;
  }
  .stat-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple));
  }
  .stat-label {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: rgba(0,255,231,0.5);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .stat-value {
    font-family: 'Orbitron', monospace;
    font-size: 24px;
    font-weight: 900;
    color: var(--neon-cyan);
    text-shadow: var(--glow-cyan);
    line-height: 1;
  }
  #lives-display {
    font-size: 18px;
    letter-spacing: 4px;
  }

  #canvas-wrap {
    position: relative;
    border: 1px solid rgba(0,255,231,0.25);
    border-radius: 6px;
    box-shadow:
      0 0 0 1px rgba(0,255,231,0.08),
      0 0 40px rgba(0,255,231,0.1),
      inset 0 0 60px rgba(0,0,20,0.8);
    overflow: hidden;
  }

  canvas {
    display: block;
    background: #020510;
  }

  /* Scanlines overlay */
  #canvas-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    border-radius: 6px;
  }

  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    background: rgba(2,5,16,0.88);
    backdrop-filter: blur(4px);
    z-index: 10;
    border-radius: 6px;
  }
  #overlay.hidden { display: none; }

  .overlay-title {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 36px;
    letter-spacing: 4px;
    color: var(--neon-cyan);
    text-shadow: var(--glow-cyan), 0 0 60px rgba(0,255,231,0.3);
    text-align: center;
    line-height: 1.2;
  }
  .overlay-sub {
    font-size: 13px;
    color: rgba(0,255,231,0.5);
    letter-spacing: 3px;
    text-align: center;
  }
  .overlay-score {
    font-family: 'Orbitron', monospace;
    font-size: 20px;
    color: var(--neon-yellow);
    text-shadow: 0 0 12px var(--neon-yellow);
  }

  .btn {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    padding: 14px 36px;
    background: transparent;
    border: 2px solid var(--neon-cyan);
    color: var(--neon-cyan);
    border-radius: 3px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    box-shadow: var(--glow-cyan);
    position: relative;
    overflow: hidden;
  }
  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--neon-cyan);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .btn:hover::before { opacity: 0.12; }
  .btn:hover {
    box-shadow: 0 0 16px var(--neon-cyan), 0 0 48px rgba(0,255,231,0.4);
    transform: scale(1.04);
  }
  .btn:active { transform: scale(0.97); }

  .hint {
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 2px;
    text-align: center;
  }

  #level-badge {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    color: var(--neon-purple);
    letter-spacing: 2px;
    text-shadow: 0 0 8px var(--neon-purple);
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div id="wrapper">
  <div id="sidebar">
    <div class="stat-box">
      <div class="stat-label">Puan</div>
      <div class="stat-value" id="score-display">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Seviye</div>
      <div class="stat-value" id="level-display">1</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Can</div>
      <div class="stat-value" id="lives-display">♥♥♥</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">En Yüksek</div>
      <div class="stat-value" id="best-display">0</div>
    </div>
  </div>

  <div id="canvas-wrap">
    <canvas id="canvas" width="480" height="600"></canvas>
    <div id="overlay">
      <div class="overlay-title" id="overlay-title">NEONBALL</div>
      <div class="overlay-sub" id="overlay-sub">BRICK BREAKER ARCADE</div>
      <div class="overlay-score" id="overlay-score" style="display:none"></div>
      <button class="btn" id="start-btn" onclick="startGame()">BAŞLAT</button>
      <div class="hint">FARE ile paddle'ı hareket ettir</div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ── Audio Engine ──────────────────────────────────────────
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone({ type = 'sine', freq = 440, freq2 = null, gain = 0.3, attack = 0.005, decay = 0.08, duration = 0.12 }) {
  try {
    const ac = getAudio();
    const osc = ac.createOscillator();
    const gainNode = ac.createGain();
    osc.connect(gainNode);
    gainNode.connect(ac.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ac.currentTime);
    if (freq2) osc.frequency.exponentialRampToValueAtTime(freq2, ac.currentTime + duration);
    gainNode.gain.setValueAtTime(0, ac.currentTime);
    gainNode.gain.linearRampToValueAtTime(gain, ac.currentTime + attack);
    gainNode.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
    osc.start(ac.currentTime);
    osc.stop(ac.currentTime + duration);
  } catch(e) {}
}

function playNoise({ gain = 0.2, duration = 0.15, filterFreq = 800 }) {
  try {
    const ac = getAudio();
    const bufSize = ac.sampleRate * duration;
    const buf = ac.createBuffer(1, bufSize, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
    const src = ac.createBufferSource();
    src.buffer = buf;
    const filter = ac.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = filterFreq;
    filter.Q.value = 0.8;
    const gainNode = ac.createGain();
    gainNode.gain.setValueAtTime(gain, ac.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
    src.connect(filter);
    filter.connect(gainNode);
    gainNode.connect(ac.destination);
    src.start();
    src.stop(ac.currentTime + duration);
  } catch(e) {}
}

// Sound effects
function sfxPaddle() {
  playTone({ type: 'triangle', freq: 320, freq2: 480, gain: 0.25, attack: 0.002, duration: 0.1 });
}
function sfxBrickHit() {
  playTone({ type: 'square', freq: 600, freq2: 300, gain: 0.15, attack: 0.002, duration: 0.07 });
}
function sfxBrickBreak() {
  playTone({ type: 'sawtooth', freq: 800, freq2: 200, gain: 0.25, attack: 0.002, duration: 0.18 });
  playNoise({ gain: 0.18, duration: 0.15, filterFreq: 1200 });
}
function sfxLost() {
  playTone({ type: 'sawtooth', freq: 260, freq2: 80, gain: 0.35, attack: 0.01, duration: 0.5 });
  playNoise({ gain: 0.25, duration: 0.4, filterFreq: 300 });
}
function sfxWall() {
  playTone({ type: 'sine', freq: 220, freq2: 180, gain: 0.12, attack: 0.002, duration: 0.06 });
}
function sfxWin() {
  [523, 659, 784, 1047].forEach((f, i) => {
    setTimeout(() => playTone({ type: 'triangle', freq: f, gain: 0.3, attack: 0.01, duration: 0.25 }), i * 120);
  });
}
function sfxGameOver() {
  [300, 240, 180, 120].forEach((f, i) => {
    setTimeout(() => playTone({ type: 'sawtooth', freq: f, gain: 0.3, attack: 0.01, duration: 0.3 }), i * 150);
  });
}
// ─────────────────────────────────────────────────────────

// Game state
let state = 'idle'; // idle, playing, dead, win
let score = 0, lives = 3, level = 1, best = 0;
let animId;

// Paddle
const paddle = { w: 90, h: 12, x: W/2 - 45, y: H - 40, speed: 0 };

// Ball
let ball = { x: W/2, y: H - 60, vx: 3.2, vy: -4, r: 8, trail: [] };

// Bricks
const COLS = 10, ROWS = 6;
const BW = (W - 40) / COLS, BH = 22;
let bricks = [];

const BRICK_COLORS = [
  { fill: '#ff2d78', glow: '#ff2d78', hp: 1 },
  { fill: '#ff6b1a', glow: '#ff6b1a', hp: 1 },
  { fill: '#ffe600', glow: '#ffe600', hp: 1 },
  { fill: '#00ffe7', glow: '#00ffe7', hp: 1 },
  { fill: '#b44eff', glow: '#b44eff', hp: 1 },
  { fill: '#ff2d78', glow: '#ff2d78', hp: 2 }, // stronger
];

function buildBricks(lvl) {
  bricks = [];
  const rowCount = Math.min(ROWS + lvl - 1, 10);
  for (let r = 0; r < rowCount; r++) {
    for (let c = 0; c < COLS; c++) {
      const colorIdx = Math.floor(Math.random() * (lvl > 2 ? 6 : 5));
      const scheme = BRICK_COLORS[colorIdx];
      bricks.push({
        x: 20 + c * BW,
        y: 50 + r * (BH + 4),
        w: BW - 4,
        h: BH,
        fill: scheme.fill,
        glow: scheme.glow,
        hp: scheme.hp + (lvl > 3 ? 1 : 0),
        maxHp: scheme.hp + (lvl > 3 ? 1 : 0),
        alive: true,
        hitFlash: 0
      });
    }
  }
}

// Particles
let particles = [];
function spawnParticles(x, y, color, n = 10) {
  for (let i = 0; i < n; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.03 + Math.random() * 0.04,
      r: 2 + Math.random() * 3,
      color
    });
  }
}

// Mouse control
canvas.addEventListener('mousemove', e => {
  if (state !== 'playing') return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  paddle.x = Math.max(0, Math.min(W - paddle.w, mx - paddle.w / 2));
});

canvas.addEventListener('click', () => {
  if (state === 'playing' && !ballLaunched) launchBall();
});

let ballLaunched = false;

function launchBall() {
  ballLaunched = true;
  ball.vx = (Math.random() > 0.5 ? 1 : -1) * (3.2 + level * 0.3);
  ball.vy = -(4 + level * 0.2);
}

function resetBall() {
  ballLaunched = false;
  ball.x = paddle.x + paddle.w / 2;
  ball.y = paddle.y - ball.r - 2;
  ball.vx = 0; ball.vy = 0;
  ball.trail = [];
}

function startGame() {
  // Tarayıcı ses politikası: kullanıcı etkileşiminde AudioContext'i başlat/devam ettir
  try {
    const ac = getAudio();
    if (ac.state === 'suspended') ac.resume();
  } catch(e) {}
  document.getElementById('overlay').classList.add('hidden');
  score = 0; lives = 3; level = 1;
  updateUI();
  buildBricks(level);
  paddle.x = W / 2 - paddle.w / 2;
  resetBall();
  particles = [];
  state = 'playing';
  if (animId) cancelAnimationFrame(animId);
  loop();
}

function nextLevel() {
  level++;
  document.getElementById('level-display').textContent = level;
  buildBricks(level);
  resetBall();
  particles = [];
}

function gameOver(win) {
  state = win ? 'win' : 'dead';
  if (!win) sfxGameOver();
  best = Math.max(best, score);
  document.getElementById('best-display').textContent = best;

  const overlay = document.getElementById('overlay');
  overlay.classList.remove('hidden');
  document.getElementById('overlay-title').textContent = win ? 'TEBRİKLER!' : 'GAME OVER';
  document.getElementById('overlay-sub').textContent = win ? 'TÜM TAŞLARI KIRDIN' : 'TOPUNU KAYBETTIN';
  const sc = document.getElementById('overlay-score');
  sc.style.display = 'block';
  sc.textContent = 'PUAN: ' + score;
  document.getElementById('start-btn').textContent = 'YENİDEN';
}

function updateUI() {
  document.getElementById('score-display').textContent = score;
  document.getElementById('level-display').textContent = level;
  const hearts = '♥'.repeat(lives) + '♡'.repeat(Math.max(0, 3 - lives));
  document.getElementById('lives-display').textContent = hearts;
}

function loop() {
  update();
  draw();
  animId = requestAnimationFrame(loop);
}

function update() {
  if (state !== 'playing') return;

  // Ball follows paddle until launched
  if (!ballLaunched) {
    ball.x = paddle.x + paddle.w / 2;
    ball.y = paddle.y - ball.r - 2;
    return;
  }

  // Trail
  ball.trail.push({ x: ball.x, y: ball.y });
  if (ball.trail.length > 12) ball.trail.shift();

  ball.x += ball.vx;
  ball.y += ball.vy;

  // Wall collisions
  if (ball.x - ball.r < 0) { ball.x = ball.r; ball.vx = Math.abs(ball.vx); sfxWall(); }
  if (ball.x + ball.r > W) { ball.x = W - ball.r; ball.vx = -Math.abs(ball.vx); sfxWall(); }
  if (ball.y - ball.r < 0) { ball.y = ball.r; ball.vy = Math.abs(ball.vy); sfxWall(); }

  // Paddle collision
  if (
    ball.y + ball.r >= paddle.y &&
    ball.y + ball.r <= paddle.y + paddle.h + 4 &&
    ball.x >= paddle.x - 4 &&
    ball.x <= paddle.x + paddle.w + 4 &&
    ball.vy > 0
  ) {
    ball.vy = -Math.abs(ball.vy);
    // Angle influence
    const hit = (ball.x - paddle.x) / paddle.w; // 0..1
    ball.vx = (hit - 0.5) * 9;
    // clamp speed
    const spd = Math.hypot(ball.vx, ball.vy);
    const maxSpd = 8 + level * 0.5;
    if (spd > maxSpd) { ball.vx *= maxSpd/spd; ball.vy *= maxSpd/spd; }
    spawnParticles(ball.x, paddle.y, '#00ffe7', 6);
    sfxPaddle();
  }

  // Ball lost
  if (ball.y - ball.r > H) {
    sfxLost();
    lives--;
    updateUI();
    if (lives <= 0) { gameOver(false); return; }
    resetBall();
    return;
  }

  // Brick collision
  for (let b of bricks) {
    if (!b.alive) continue;
    if (
      ball.x + ball.r > b.x &&
      ball.x - ball.r < b.x + b.w &&
      ball.y + ball.r > b.y &&
      ball.y - ball.r < b.y + b.h
    ) {
      b.hp--;
      b.hitFlash = 8;
      spawnParticles(ball.x, ball.y, b.glow, 12);

      if (b.hp <= 0) {
        b.alive = false;
        score += 10 * level;
        updateUI();
        spawnParticles(b.x + b.w/2, b.y + b.h/2, b.glow, 18);
        sfxBrickBreak();
      } else {
        sfxBrickHit();
      }

      // Reflect
      const overlapLeft   = ball.x + ball.r - b.x;
      const overlapRight  = b.x + b.w - (ball.x - ball.r);
      const overlapTop    = ball.y + ball.r - b.y;
      const overlapBottom = b.y + b.h - (ball.y - ball.r);
      const minH = Math.min(overlapLeft, overlapRight);
      const minV = Math.min(overlapTop, overlapBottom);
      if (minH < minV) ball.vx = -ball.vx;
      else ball.vy = -ball.vy;
      break;
    }
  }

  // Check win
  if (bricks.every(b => !b.alive)) {
    if (level >= 5) { sfxWin(); gameOver(true); }
    else { nextLevel(); }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.08;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Hit flash cooldown
  for (let b of bricks) if (b.hitFlash > 0) b.hitFlash--;
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Background gradient
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#020510');
  bg.addColorStop(1, '#060212');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Subtle grid lines
  ctx.strokeStyle = 'rgba(0,255,231,0.04)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  // Bricks
  for (const b of bricks) {
    if (!b.alive) continue;
    const flash = b.hitFlash > 0;
    const alpha = 0.15 + (b.hp / b.maxHp) * 0.15;

    // Glow
    ctx.shadowBlur = flash ? 28 : 14;
    ctx.shadowColor = b.glow;

    // Fill
    ctx.fillStyle = flash ? '#ffffff' : b.fill;
    ctx.globalAlpha = flash ? 1 : 0.88;
    roundRect(ctx, b.x + 1, b.y + 1, b.w - 2, b.h - 2, 3);
    ctx.fill();

    // Inner gradient shine
    ctx.globalAlpha = 0.3;
    const shine = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
    shine.addColorStop(0, 'rgba(255,255,255,0.5)');
    shine.addColorStop(0.5, 'rgba(255,255,255,0)');
    ctx.fillStyle = shine;
    roundRect(ctx, b.x + 1, b.y + 1, b.w - 2, b.h/2, 3);
    ctx.fill();

    // HP indicator (dots)
    if (b.maxHp > 1) {
      ctx.globalAlpha = 0.9;
      ctx.fillStyle = '#fff';
      ctx.shadowBlur = 0;
      for (let i = 0; i < b.hp; i++) {
        ctx.beginPath();
        ctx.arc(b.x + b.w/2 + (i - (b.hp-1)/2) * 8, b.y + b.h/2, 2, 0, Math.PI*2);
        ctx.fill();
      }
    }

    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life * 0.9;
    ctx.shadowBlur = 12;
    ctx.shadowColor = p.color;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;

  // Ball trail
  for (let i = 0; i < ball.trail.length; i++) {
    const t = ball.trail[i];
    const alpha = (i / ball.trail.length) * 0.5;
    const r = ball.r * (i / ball.trail.length) * 0.8;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#00ffe7';
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#00ffe7';
    ctx.beginPath();
    ctx.arc(t.x, t.y, r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Ball
  ctx.shadowBlur = 24;
  ctx.shadowColor = '#00ffe7';
  const ballGrad = ctx.createRadialGradient(ball.x - 2, ball.y - 2, 1, ball.x, ball.y, ball.r);
  ballGrad.addColorStop(0, '#ffffff');
  ballGrad.addColorStop(0.4, '#00ffe7');
  ballGrad.addColorStop(1, '#0088aa');
  ctx.fillStyle = ballGrad;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Paddle
  ctx.shadowBlur = 20;
  ctx.shadowColor = '#00ffe7';
  const pGrad = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.h);
  pGrad.addColorStop(0, '#00ffe7');
  pGrad.addColorStop(0.4, '#00c9b8');
  pGrad.addColorStop(1, '#006655');
  ctx.fillStyle = pGrad;
  roundRect(ctx, paddle.x, paddle.y, paddle.w, paddle.h, 5);
  ctx.fill();

  // Paddle shine
  ctx.globalAlpha = 0.4;
  const pShine = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.h * 0.4);
  pShine.addColorStop(0, 'rgba(255,255,255,0.7)');
  pShine.addColorStop(1, 'transparent');
  ctx.fillStyle = pShine;
  roundRect(ctx, paddle.x + 2, paddle.y + 1, paddle.w - 4, paddle.h * 0.45, 4);
  ctx.fill();
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;

  // "Click to launch" hint
  if (!ballLaunched && state === 'playing') {
    ctx.globalAlpha = 0.5 + 0.5 * Math.sin(Date.now() / 300);
    ctx.fillStyle = '#00ffe7';
    ctx.font = '12px "Share Tech Mono"';
    ctx.textAlign = 'center';
    ctx.fillText('TIKLAYARAK BAŞLAT', W/2, paddle.y - 18);
    ctx.globalAlpha = 1;
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// Keyboard support
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && state === 'playing' && !ballLaunched) launchBall();
  if (e.code === 'ArrowLeft') paddle.x = Math.max(0, paddle.x - 24);
  if (e.code === 'ArrowRight') paddle.x = Math.min(W - paddle.w, paddle.x + 24);
});

// Initial idle draw
(function idleDraw() {
  if (state !== 'idle') return;
  ctx.clearRect(0, 0, W, H);
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#020510');
  bg.addColorStop(1, '#060212');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = 'rgba(0,255,231,0.04)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
  requestAnimationFrame(idleDraw);
})();
</script>
