<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uzay Zone - Oyun Portalı</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: #050510;
  color: #e8e0f0;
  font-family: 'Nunito', sans-serif;
  overflow-x: hidden;
}

canvas#starfield {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
}

.nebula-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1;
  pointer-events: none;
  background:
    radial-gradient(ellipse at 15% 25%, rgba(100, 40, 180, 0.13), transparent 55%),
    radial-gradient(ellipse at 85% 75%, rgba(0, 100, 220, 0.09), transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(120, 60, 200, 0.05), transparent 70%);
}

.container {
  position: relative;
  z-index: 2;
  max-width: 1040px;
  margin: 0 auto;
  padding: 40px 20px 60px;
}

/* ─── Header ─── */
header {
  text-align: center;
  margin-bottom: 60px;
  padding-top: 30px;
}

.site-title {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: 3.6rem;
  letter-spacing: 0.15em;
  background: linear-gradient(135deg, #00c8ff, #a855f7, #00c8ff, #a855f7);
  background-size: 300% 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmerTitle 4s ease infinite;
  text-shadow: none;
  filter: drop-shadow(0 0 30px rgba(0, 200, 255, 0.25));
}

.subtitle {
  font-family: 'Orbitron', sans-serif;
  font-weight: 400;
  font-size: 1rem;
  letter-spacing: 0.35em;
  color: #8888aa;
  margin-top: 10px;
  text-transform: uppercase;
}

/* ─── Games Grid ─── */
.games-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
  gap: 32px;
  margin-bottom: 60px;
}

/* ─── Game Card ─── */
.game-card {
  position: relative;
  border-radius: 20px;
  overflow: hidden;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  text-decoration: none;
  color: #e8e0f0;
  display: flex;
  flex-direction: column;
  transition: transform 0.35s ease, box-shadow 0.35s ease;
  opacity: 0;
  animation: fadeInUp 0.6s ease forwards;
}

.game-card:hover {
  transform: translateY(-8px) scale(1.02);
  box-shadow: 0 20px 60px var(--card-glow), 0 0 40px var(--card-glow);
}

.card-top-bar {
  height: 4px;
  background: var(--card-bar);
  transition: height 0.3s ease;
}

.game-card:hover .card-top-bar {
  height: 5px;
}

.card-body {
  padding: 32px 28px 20px;
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}

.card-icon {
  font-size: 3rem;
  margin-bottom: 16px;
  animation: float 3s ease-in-out infinite;
  filter: drop-shadow(0 4px 12px var(--card-glow));
}

.card-title {
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  font-size: 1.35rem;
  letter-spacing: 0.06em;
  margin-bottom: 8px;
  color: #fff;
}

.card-genre {
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--card-accent);
  margin-bottom: 14px;
  opacity: 0.9;
}

.card-desc {
  font-size: 0.92rem;
  line-height: 1.6;
  color: #aaa8c0;
  flex: 1;
}

.card-footer {
  padding: 18px 28px 24px;
  text-align: center;
}

.play-btn {
  display: inline-block;
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  font-size: 0.85rem;
  letter-spacing: 0.12em;
  color: var(--card-accent);
  border: 1.5px solid var(--card-accent);
  border-radius: 30px;
  padding: 10px 32px;
  transition: all 0.3s ease;
  background: transparent;
}

.game-card:hover .play-btn {
  background: var(--card-accent);
  color: #050510;
  box-shadow: 0 0 20px var(--card-glow);
}

/* ─── Footer ─── */
footer {
  text-align: center;
  color: #555568;
  font-size: 0.82rem;
  padding-top: 20px;
  border-top: 1px solid rgba(255,255,255,0.05);
}

/* ─── Animations ─── */
@keyframes shimmerTitle {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ─── Responsive ─── */
@media (max-width: 640px) {
  .site-title { font-size: 2.4rem; }
  .subtitle { font-size: 0.8rem; }
  header { margin-bottom: 40px; padding-top: 20px; }
  .games-grid { gap: 24px; }
  .card-body { padding: 24px 20px 16px; }
  .card-icon { font-size: 2.4rem; }
  .card-title { font-size: 1.15rem; }
}

@media (max-width: 380px) {
  .site-title { font-size: 1.8rem; letter-spacing: 0.08em; }
  .games-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<canvas id="starfield"></canvas>
<div class="nebula-overlay"></div>

<div class="container">
  <header>
    <h1 class="site-title">UZAY ZONE</h1>
    <p class="subtitle">Oyun Portalı</p>
  </header>
  <section class="games-grid" id="gamesGrid"></section>
  <footer>
    <p>&copy; 2026 Uzay Zone</p>
  </footer>
</div>

<script>
// ─── Game Data ───
const GAMES = [
  {
    title: 'Çöp Cümbüşü',
    genre: 'Bulmaca',
    desc: 'Kibritleri hareket ettirerek hedef sayıya ulaş! Üç farklı zorluk seviyesiyle bulmaca çöz.',
    href: 'kibrit-oyunu/index.html',
    icon: '🔥',
    colors: {
      bg: 'linear-gradient(135deg, #2a1f14, #1a1208)',
      accent: '#ff8c2e',
      glow: 'rgba(255,140,46,0.18)',
      bar: 'linear-gradient(90deg, #ff4757, #ff8c2e, #ffc312)',
      border: 'rgba(255,140,46,0.15)'
    }
  },
  {
    title: 'NEONBALL',
    genre: 'Arcade',
    desc: 'Neon topla tuğlaları kır, seviyeleri geç! Klasik brick-breaker neon stilde.',
    href: 'neonball/index.html',
    icon: '🏓',
    colors: {
      bg: 'linear-gradient(135deg, #04060f, #0a1028)',
      accent: '#00ffe7',
      glow: 'rgba(0,255,231,0.15)',
      bar: 'linear-gradient(90deg, #00ffe7, #b44eff)',
      border: 'rgba(0,255,231,0.2)'
    }
  },
  {
    title: 'XOX',
    genre: 'Strateji',
    desc: 'Klasik XOX oyunu! Yapay zekaya karşı oyna veya arkadaşınla yarış.',
    href: 'xox/index.html',
    icon: '⭕',
    colors: {
      bg: 'linear-gradient(135deg, #1a1a2e, #0f3460)',
      accent: '#e94560',
      glow: 'rgba(233,69,96,0.15)',
      bar: 'linear-gradient(90deg, #e94560, #0f9b8e)',
      border: 'rgba(233,69,96,0.15)'
    }
  }
];

// ─── Render Cards ───
function renderCards() {
  const grid = document.getElementById('gamesGrid');
  grid.innerHTML = GAMES.map((g, i) => `
    <a href="${g.href}" class="game-card"
       style="--card-bg:${g.colors.bg};--card-accent:${g.colors.accent};--card-glow:${g.colors.glow};--card-bar:${g.colors.bar};--card-border:${g.colors.border};animation-delay:${i * 0.12}s">
      <div class="card-top-bar"></div>
      <div class="card-body">
        <div class="card-icon">${g.icon}</div>
        <h2 class="card-title">${g.title}</h2>
        <p class="card-genre">${g.genre}</p>
        <p class="card-desc">${g.desc}</p>
      </div>
      <div class="card-footer">
        <span class="play-btn">OYNA →</span>
      </div>
    </a>
  `).join('');
}

// ─── Starfield ───
const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');
let stars = [];
let shootingStars = [];
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function createStars() {
  stars = [];
  const count = Math.floor((W * H) / 4000);
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.4 + 0.3,
      speed: Math.random() * 0.15 + 0.02,
      opacity: Math.random() * 0.6 + 0.3,
      twinkleSpeed: Math.random() * 0.008 + 0.002,
      twinklePhase: Math.random() * Math.PI * 2
    });
  }
}

function spawnShootingStar() {
  shootingStars.push({
    x: Math.random() * W * 0.8,
    y: Math.random() * H * 0.3,
    len: Math.random() * 80 + 40,
    speed: Math.random() * 6 + 4,
    angle: Math.PI / 4 + (Math.random() - 0.5) * 0.3,
    opacity: 1,
    life: 1
  });
}

function animate() {
  ctx.clearRect(0, 0, W, H);

  // Draw stars
  for (const s of stars) {
    s.y += s.speed;
    s.twinklePhase += s.twinkleSpeed;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
    const twinkle = Math.sin(s.twinklePhase) * 0.3 + 0.7;
    const alpha = s.opacity * twinkle;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(220, 225, 255, ${alpha})`;
    ctx.fill();
  }

  // Draw shooting stars
  for (let i = shootingStars.length - 1; i >= 0; i--) {
    const ss = shootingStars[i];
    ss.x += Math.cos(ss.angle) * ss.speed;
    ss.y += Math.sin(ss.angle) * ss.speed;
    ss.life -= 0.015;
    ss.opacity = ss.life;
    if (ss.life <= 0) { shootingStars.splice(i, 1); continue; }
    const tailX = ss.x - Math.cos(ss.angle) * ss.len;
    const tailY = ss.y - Math.sin(ss.angle) * ss.len;
    const grad = ctx.createLinearGradient(tailX, tailY, ss.x, ss.y);
    grad.addColorStop(0, `rgba(200, 220, 255, 0)`);
    grad.addColorStop(1, `rgba(200, 220, 255, ${ss.opacity})`);
    ctx.beginPath();
    ctx.moveTo(tailX, tailY);
    ctx.lineTo(ss.x, ss.y);
    ctx.strokeStyle = grad;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // Random shooting star
  if (Math.random() < 0.003) spawnShootingStar();

  requestAnimationFrame(animate);
}

// ─── Init ───
window.addEventListener('resize', () => { resize(); createStars(); });
resize();
createStars();
renderCards();
animate();
</script>
</body>
</html>
